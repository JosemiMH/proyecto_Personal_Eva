name: Production readiness

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: production-readiness-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Build, security and smoke tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install locked dependencies
        run: npm ci
      - name: Type-check
        run: npm run check
      - name: Build production artifacts
        run: npm run build
      - name: Scan source and build for secrets
        run: npm run test:secrets
      - name: Verify SEO output
        run: npm run test:seo
      - name: Run production HTTP smoke tests
        run: npm run test:http
      - name: Confirm committed artifacts are current
        run: git diff --exit-code -- dist
