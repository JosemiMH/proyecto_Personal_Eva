name: Prepare production artifacts

on:
  push:
    branches:
      - agent/production-deployment-readiness-2026-07-22

permissions:
  contents: write

concurrency:
  group: prepare-production-artifacts
  cancel-in-progress: true

jobs:
  build:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run check
      - run: npm run build
      - run: npm run test:secrets
      - run: npm run test:seo
      - run: npm run test:http
      - name: Commit verified production artifacts
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add dist
          if git diff --cached --quiet; then
            echo "Production artifacts are already current."
          else
            git commit -m "build: refresh verified production artifacts"
            git push
          fi
